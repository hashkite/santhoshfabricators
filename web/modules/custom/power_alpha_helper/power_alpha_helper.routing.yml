power_alpha_helper.dashboard:
  path: '/dashboard'
  defaults:
    _controller: '\Drupal\power_alpha_helper\Controller\DashboardController::overview'
    _title: 'Administrative Overview'
  requirements:
    _permission: 'access content'

power_alpha_helper.invoice_settings:
  path: '/admin/config/system/invoice-settings'
  defaults:
    _form: '\Drupal\power_alpha_helper\Form\InvoiceSettingsForm'
    _title: 'Invoice Settings'
  requirements:
    _permission: 'administer site configuration'
